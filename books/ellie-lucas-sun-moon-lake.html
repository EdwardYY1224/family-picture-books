  <main class="book-shell">
    <section class="book-page">
      <div class="illustration" id="illustration" aria-hidden="true"></div>
      <div class="cover-overlay" id="coverOverlay">
        <p class="cover-kicker">A SUN MOON LAKE FAMILY STORY</p>
        <h1>Ellie 和 Lucas 的<br>日月潭飯店大冒險</h1>
        <p class="cover-sub">泳池、電動車、溫泉，還有一家人的大笑聲</p>

        <div class="page-nav">

  <div class="tips-overlay" id="tipsOverlay" hidden>
    <div class="tips-card">
      <h2>和 Ellie、Lucas 一起聊聊</h2>
      <ul>
        <li><b>第一次：</b>你第一次住飯店時，最想先做什麼？</li>
        <li><b>再試一次：</b>Ellie 怎麼從不太會開，慢慢變厲害？</li>
        <li><b>水域安全：</b>泳池與浴池都要有大人在伸手可及的地方陪伴。</li>
        <li><b>溫度安全：</b>泡湯時間與水溫由大人確認；覺得冷、熱或不舒服要立刻說。</li>
        <li><b>記憶：</b>這趟旅行中，哪一個笑聲最讓你記得？</li>
      </ul>
      <button class="start-button" id="tipsClose" type="button">回到故事</button>
    </div>
